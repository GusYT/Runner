<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overwatch Runner</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f12;
      font-family: Arial, sans-serif;
      color: white;
      padding: 16px;
    }

    .game-wrap {
      width: min(1000px, 96vw);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .score {
      font-size: 1rem;
      font-weight: 700;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: #1a1a1f;
      border: 2px solid #ffffff;
      border-radius: 12px;
      touch-action: manipulation;
    }

    .controls {
      margin-top: 12px;
      text-align: center;
      color: #cfcfcf;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .buttons {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      background: #ffffff;
      color: #111;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: #e9e9e9;
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <div class="hud">
      <div class="title">Overwatch Runner</div>
      <div class="score">Score: <span id="score">0</span></div>
    </div>

    <canvas id="game" width="1000" height="320"></canvas>

    <div class="buttons">
      <button id="startBtn">Start</button>
      <button id="jumpBtn">Jump</button>
      <button id="restartBtn">Restart</button>
    </div>

    <div class="controls">
      <div><strong>Desktop:</strong> Space = Start / Jump / Restart, ↑ = Jump, R = Restart</div>
      <div><strong>Mobile:</strong> Tap the game = Start / Jump / Restart</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");

    const startBtn = document.getElementById("startBtn");
    const jumpBtn = document.getElementById("jumpBtn");
    const restartBtn = document.getElementById("restartBtn");

    ctx.imageSmoothingEnabled = false;

    const GROUND_Y = 250;

    let score = 0;
    let baseSpeed = 6;
    let speed = baseSpeed;
    let gameOver = false;
    let gameStarted = false;
    let spawnTimer = 0;
    let groundOffset = 0;
    let frame = 0;
    let overlayPulse = 0;

    const doomfist = new Image();
    doomfist.src = "Doomfist.png";

    const ana = new Image();
    ana.src = "Ana.png";

    const stars = Array.from({ length: 28 }, () => ({
      x: Math.random() * canvas.width,
      y: 25 + Math.random() * 130,
      r: 1 + Math.random() * 2,
      speed: 0.2 + Math.random() * 0.8
    }));

    const player = {
      x: 90,
      y: GROUND_Y - 88,
      width: 72,
      height: 88,
      vy: 0,
      gravity: 0.85,
      jumpPower: -15.5,
      grounded: true,
      runTime: 0,
      squash: 1,
      stretch: 1,
      rotation: 0,
      justLanded: false
    };

    let enemies = [];
    let particles = [];

    function resetPlayer() {
      player.y = GROUND_Y - player.height;
      player.vy = 0;
      player.grounded = true;
      player.runTime = 0;
      player.squash = 1;
      player.stretch = 1;
      player.rotation = 0;
      player.justLanded = false;
    }

    function resetGame() {
      score = 0;
      speed = baseSpeed;
      gameOver = false;
      gameStarted = false;
      spawnTimer = 60;
      groundOffset = 0;
      enemies = [];
      particles = [];
      frame = 0;
      resetPlayer();
      scoreEl.textContent = score;
    }

    function startGame() {
      score = 0;
      speed = baseSpeed;
      gameOver = false;
      gameStarted = true;
      spawnTimer = 60;
      groundOffset = 0;
      enemies = [];
      particles = [];
      frame = 0;
      resetPlayer();
      scoreEl.textContent = score;
    }

    function restartGame() {
      score = 0;
      speed = baseSpeed;
      gameOver = false;
      gameStarted = true;
      spawnTimer = 60;
      groundOffset = 0;
      enemies = [];
      particles = [];
      frame = 0;
      resetPlayer();
      scoreEl.textContent = score;
    }

    function createDust(x, y, amount = 4, strong = false) {
      for (let i = 0; i < amount; i++) {
        particles.push({
          x,
          y,
          vx: -(1 + Math.random() * (strong ? 4 : 2)) - speed * 0.1,
          vy: -Math.random() * (strong ? 2.5 : 1.2),
          size: 2 + Math.random() * 4,
          life: 20 + Math.random() * 14,
          maxLife: 20 + Math.random() * 14
        });
      }
    }

    function jump() {
      if (player.grounded) {
        player.vy = player.jumpPower;
        player.grounded = false;
        player.stretch = 1.12;
        player.squash = 0.9;
        createDust(player.x + 16, GROUND_Y - 4, 7, true);
      }
    }

    function spawnEnemy() {
      enemies.push({
        x: canvas.width + 30,
        baseY: GROUND_Y - 74,
        y: GROUND_Y - 74,
        width: 58,
        height: 74,
        t: Math.random() * Math.PI * 2,
        scale: 1
      });
    }

    function updatePlayer() {
      const wasGrounded = player.grounded;

      player.vy += player.gravity;
      player.y += player.vy;

      if (player.y >= GROUND_Y - player.height) {
        player.y = GROUND_Y - player.height;
        player.vy = 0;
        player.grounded = true;

        if (!wasGrounded) {
          player.squash = 1.18;
          player.stretch = 0.88;
          createDust(player.x + 18, GROUND_Y - 3, 8, true);
        }
      } else {
        player.grounded = false;
      }

      if (player.grounded && gameStarted && !gameOver) {
        player.runTime += 0.18 + speed * 0.01;

        if (frame % 10 === 0) {
          createDust(player.x + 8, GROUND_Y - 2, 2, false);
        }
      }

      if (!player.grounded) {
        player.rotation = Math.max(-0.2, Math.min(0.22, player.vy * 0.02));
      } else {
        player.rotation *= 0.75;
      }

      player.squash += (1 - player.squash) * 0.18;
      player.stretch += (1 - player.stretch) * 0.18;
    }

    function updateEnemies() {
      spawnTimer--;

      if (spawnTimer <= 0) {
        spawnEnemy();

        const minSpawn = 55;
        const maxSpawn = 95;
        const speedFactor = Math.min((speed - baseSpeed) * 3, 25);

        spawnTimer = Math.floor(
          minSpawn + Math.random() * (maxSpawn - minSpawn) - speedFactor
        );

        if (spawnTimer < 38) {
          spawnTimer = 38;
        }
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        enemy.x -= speed;
        enemy.t += 0.08;
        enemy.y = enemy.baseY + Math.sin(enemy.t) * 4;
        enemy.scale = 1 + Math.sin(enemy.t * 1.2) * 0.03;

        if (enemy.x + enemy.width < 0) {
          enemies.splice(i, 1);
          score++;
        }
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.life--;

        if (p.life <= 0) {
          particles.splice(i, 1);
        }
      }
    }

    function updateGround() {
      groundOffset += speed;
      if (groundOffset >= 36) {
        groundOffset = 0;
      }
    }

    function updateStars() {
      for (const star of stars) {
        star.x -= star.speed + speed * 0.08;
        if (star.x < -5) {
          star.x = canvas.width + 5;
          star.y = 25 + Math.random() * 130;
        }
      }
    }

    function checkCollision() {
      const hitbox = {
        x: player.x + 14,
        y: player.y + 10,
        width: player.width - 28,
        height: player.height - 12
      };

      for (const enemy of enemies) {
        const enemyBox = {
          x: enemy.x + 10,
          y: enemy.y + 8,
          width: enemy.width - 20,
          height: enemy.height - 10
        };

        const hit =
          hitbox.x < enemyBox.x + enemyBox.width &&
          hitbox.x + hitbox.width > enemyBox.x &&
          hitbox.y < enemyBox.y + enemyBox.height &&
          hitbox.y + hitbox.height > enemyBox.y;

        if (hit) {
          gameOver = true;
          createDust(player.x + player.width / 2, player.y + player.height / 2, 14, true);
          break;
        }
      }
    }

    function drawBackground() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, "#11131a");
      gradient.addColorStop(1, "#1a1a1f");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (const star of stars) {
        ctx.globalAlpha = 0.45 + Math.sin(frame * 0.03 + star.x * 0.01) * 0.2;
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(star.x, star.y, star.r, star.r);
      }
      ctx.globalAlpha = 1;

      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y);
      ctx.lineTo(canvas.width, GROUND_Y);
      ctx.stroke();

      ctx.fillStyle = "#888";
      for (let i = -36; i < canvas.width + 36; i += 36) {
        ctx.fillRect(i - groundOffset, GROUND_Y + 10, 18, 3);
      }
    }

    function drawPlayer() {
      const bob = player.grounded && gameStarted && !gameOver
        ? Math.sin(player.runTime) * 3
        : 0;

      let drawW = player.width * player.squash;
      let drawH = player.height * player.stretch;

      if (!player.grounded) {
        drawW *= 0.98;
        drawH *= 1.02;
      }

      const cx = player.x + player.width / 2;
      const cy = player.y + player.height / 2 + bob;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(player.rotation);

      if (doomfist.complete && doomfist.naturalWidth > 0) {
        ctx.drawImage(
          doomfist,
          -drawW / 2,
          -drawH / 2,
          drawW,
          drawH
        );
      } else {
        ctx.fillStyle = "#f0b";
        ctx.fillRect(-drawW / 2, -drawH / 2, drawW, drawH);
      }

      ctx.restore();
    }

    function drawEnemies() {
      for (const enemy of enemies) {
        const w = enemy.width * enemy.scale;
        const h = enemy.height * (2 - enemy.scale);
        const cx = enemy.x + enemy.width / 2;
        const cy = enemy.y + enemy.height / 2;

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(Math.sin(enemy.t) * 0.03);

        if (ana.complete && ana.naturalWidth > 0) {
          ctx.drawImage(
            ana,
            -w / 2,
            -h / 2,
            w,
            h
          );
        } else {
          ctx.fillStyle = "#6cf";
          ctx.fillRect(-w / 2, -h / 2, w, h);
        }

        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of particles) {
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.globalAlpha = alpha * 0.8;
        ctx.fillStyle = "#d8d8d8";
        ctx.fillRect(p.x, p.y, p.size, p.size);
      }
      ctx.globalAlpha = 1;
    }

    function drawOverlay() {
      ctx.textAlign = "center";

      if (!gameStarted) {
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(canvas.width / 2 - 230, 70, 460, 120);

        ctx.fillStyle = "#fff";
        ctx.font = "bold 30px Arial";
        ctx.fillText("Overwatch Runner", canvas.width / 2, 110);

        ctx.font = "18px Arial";
        ctx.fillText("Press Space or tap to start", canvas.width / 2, 145);
      }

      if (gameOver) {
        const pulse = 0.6 + Math.sin(overlayPulse) * 0.08;

        ctx.fillStyle = `rgba(0,0,0,${pulse})`;
        ctx.fillRect(canvas.width / 2 - 180, 80, 360, 110);

        ctx.fillStyle = "#fff";
        ctx.font = "bold 30px Arial";
        ctx.fillText("GAME OVER", canvas.width / 2, 120);

        ctx.font = "18px Arial";
        ctx.fillText("Press R, Space, or tap to restart", canvas.width / 2, 155);
      }
    }

    function drawScore() {
      scoreEl.textContent = score;
    }

    function gameLoop() {
      frame++;
      overlayPulse += 0.08;

      drawBackground();

      if (gameStarted && !gameOver) {
        speed += 0.003;
        speed = Math.min(speed, 14);

        updateStars();
        updatePlayer();
        updateEnemies();
        updateParticles();
        updateGround();
        checkCollision();
      } else {
        updateStars();
        updateParticles();
      }

      drawParticles();
      drawPlayer();
      drawEnemies();
      drawOverlay();
      drawScore();

      requestAnimationFrame(gameLoop);
    }

    function handleCanvasTap() {
      if (!gameStarted) {
        startGame();
        return;
      }

      if (gameOver) {
        restartGame();
        return;
      }

      jump();
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();

        if (!gameStarted) {
          startGame();
        } else if (gameOver) {
          restartGame();
        } else {
          jump();
        }
      }

      if (e.code === "ArrowUp") {
        e.preventDefault();
        if (gameStarted && !gameOver) {
          jump();
        }
      }

      if (e.code === "KeyR") {
        restartGame();
      }
    });

    canvas.addEventListener("pointerdown", () => {
      handleCanvasTap();
    });

    startBtn.addEventListener("click", () => {
      if (!gameStarted || gameOver) {
        startGame();
      }
    });

    jumpBtn.addEventListener("click", () => {
      handleCanvasTap();
    });

    restartBtn.addEventListener("click", () => {
      restartGame();
    });

    resetGame();
    gameLoop();
  </script>
</body>
</html>
