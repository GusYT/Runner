<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Dino</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #eeeeee;
    }

    .header {
      position: fixed;
      top: 15px;
      left: 15px;
      z-index: 10;
      background: rgba(255,255,255,0.92);
      padding: 12px 16px;
      border-radius: 12px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.15);
    }

    .header h1 {
      margin: 0 0 6px 0;
      font-size: 18px;
    }

    .header p {
      margin: 0;
      font-size: 13px;
      color: #444;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>The Dino</h1>
    <p>Play Chrome Dino directly in the browser</p>
  </div>

  <iframe
    src="https://chromedino.com/"
    frameborder="0"
    scrolling="no"
    loading="lazy">
  </iframe>
</body>
</html>
