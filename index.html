<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overwatch Runner</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f12;
      font-family: Arial, sans-serif;
      color: white;
      padding: 16px;
    }

    .game-wrap {
      width: min(1000px, 96vw);
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .score {
      font-size: 1rem;
      font-weight: 700;
    }

    canvas {
      width: 100%;
      height: auto;
      display: block;
      background: #1a1a1f;
      border: 2px solid #ffffff;
      border-radius: 12px;
    }

    .controls {
      margin-top: 10px;
      text-align: center;
      color: #cfcfcf;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="game-wrap">
    <div class="hud">
      <div class="title">Overwatch Runner</div>
      <div class="score">Score: <span id="score">0</span></div>
    </div>

    <canvas id="game" width="1000" height="320"></canvas>

    <div class="controls">
      Press <strong>Space</strong> / <strong>↑</strong> to jump • Press <strong>R</strong> to restart
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");

    ctx.imageSmoothingEnabled = false;

    const GROUND_Y = 250;

    let score = 0;
    let speed = 6;
    let gameOver = false;
    let spawnTimer = 0;
    let animationId = null;

    const doomfist = new Image();
    doomfist.src = "Doomfist.png";

    const ana = new Image();
    ana.src = "Ana.png";

    const player = {
      x: 90,
      y: GROUND_Y - 88,
      width: 72,
      height: 88,
      vy: 0,
      gravity: 0.85,
      jumpPower: -15.5,
      grounded: true
    };

    let enemies = [];

    function resetGame() {
      score = 0;
      speed = 6;
      gameOver = false;
      spawnTimer = 50;
      enemies = [];
      player.y = GROUND_Y - player.height;
      player.vy = 0;
      player.grounded = true;
    }

    function jump() {
      if (gameOver) return;
      if (player.grounded) {
        player.vy = player.jumpPower;
        player.grounded = false;
      }
    }

    function spawnEnemy() {
      enemies.push({
        x: canvas.width + 30,
        y: GROUND_Y - 74,
        width: 58,
        height: 74
      });
    }

    function updatePlayer() {
      player.vy += player.gravity;
      player.y += player.vy;

      if (player.y >= GROUND_Y - player.height) {
        player.y = GROUND_Y - player.height;
        player.vy = 0;
        player.grounded = true;
      }
    }

    function updateEnemies() {
      spawnTimer--;

      if (spawnTimer <= 0) {
        spawnEnemy();
        spawnTimer = Math.floor(85 + Math.random() * 45);
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].x -= speed;

        if (enemies[i].x + enemies[i].width < 0) {
          enemies.splice(i, 1);
          score++;
          if (score % 5 === 0) speed += 0.35;
        }
      }
    }

    function checkCollision() {
      const hitbox = {
        x: player.x + 14,
        y: player.y + 10,
        width: player.width - 28,
        height: player.height - 12
      };

      for (const enemy of enemies) {
        const enemyBox = {
          x: enemy.x + 10,
          y: enemy.y + 8,
          width: enemy.width - 20,
          height: enemy.height - 10
        };

        const hit =
          hitbox.x < enemyBox.x + enemyBox.width &&
          hitbox.x + hitbox.width > enemyBox.x &&
          hitbox.y < enemyBox.y + enemyBox.height &&
          hitbox.y + hitbox.height > enemyBox.y;

        if (hit) {
          gameOver = true;
          break;
        }
      }
    }

    function drawBackground() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // sky
      ctx.fillStyle = "#1a1a1f";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // ground line
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, GROUND_Y);
      ctx.lineTo(canvas.width, GROUND_Y);
      ctx.stroke();

      // floor decoration
      ctx.fillStyle = "#888";
      for (let i = 0; i < canvas.width; i += 36) {
        ctx.fillRect(i, GROUND_Y + 10, 18, 3);
      }
    }

    function drawPlayer() {
      if (doomfist.complete) {
        ctx.drawImage(
          doomfist,
          player.x,
          player.y,
          player.width,
          player.height
        );
      } else {
        ctx.fillStyle = "#f0b";
        ctx.fillRect(player.x, player.y, player.width, player.height);
      }
    }

    function drawEnemies() {
      for (const enemy of enemies) {
        if (ana.complete) {
          ctx.drawImage(
            ana,
            enemy.x,
            enemy.y,
            enemy.width,
            enemy.height
          );
        } else {
          ctx.fillStyle = "#6cf";
          ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
        }
      }
    }

    function drawScore() {
      scoreEl.textContent = score;
    }

    function drawGameOver() {
      if (!gameOver) return;

      ctx.fillStyle = "rgba(0,0,0,0.65)";
      ctx.fillRect(canvas.width / 2 - 160, 95, 320, 90);

      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.font = "bold 30px Arial";
      ctx.fillText("GAME OVER", canvas.width / 2, 130);

      ctx.font = "18px Arial";
      ctx.fillText("Press R to restart", canvas.width / 2, 160);
    }

    function loop() {
      drawBackground();

      if (!gameOver) {
        updatePlayer();
        updateEnemies();
        checkCollision();
      }

      drawPlayer();
      drawEnemies();
      drawScore();
      drawGameOver();

      animationId = requestAnimationFrame(loop);
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space" || e.code === "ArrowUp") {
        e.preventDefault();
        jump();
      }

      if (e.code === "KeyR") {
        resetGame();
      }
    });

    canvas.addEventListener("pointerdown", () => {
      jump();
    });

    resetGame();
    loop();
  </script>
</body>
</html>
