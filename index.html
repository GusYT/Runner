<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Overwatch Runner</title>

<style>

body{
margin:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
color:white;
}

canvas{
background:#1e1e1e;
border:3px solid white;
border-radius:10px;
}

</style>

</head>

<body>

<canvas id="game" width="1000" height="300"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

ctx.imageSmoothingEnabled = false;

const GROUND = 240;

let score = 0;
let speed = 6;
let gameOver = false;
let spawnTimer = 0;

const doomfist = new Image();
doomfist.src = "Doomfist.png";

const ana = new Image();
ana.src = "Ana.png";

const player = {
x:80,
y:GROUND-100,
width:90,
height:100,
vy:0,
gravity:0.9,
jumpPower:-16,
grounded:true
};

let enemies = [];

function jump(){

if(player.grounded){
player.vy = player.jumpPower;
player.grounded = false;
}

}

document.addEventListener("keydown",(e)=>{
if(e.code==="Space" || e.code==="ArrowUp"){
jump();
}
});

canvas.addEventListener("click",jump);

function spawnEnemy(){

enemies.push({
x:canvas.width+40,
y:GROUND-90,
width:80,
height:90
});

}

function updatePlayer(){

player.vy += player.gravity;
player.y += player.vy;

if(player.y >= GROUND-player.height){

player.y = GROUND-player.height;
player.vy = 0;
player.grounded = true;

}

}

function updateEnemies(){

spawnTimer--;

if(spawnTimer<=0){

spawnEnemy();

spawnTimer = 80 + Math.random()*60;

}

for(let i=enemies.length-1;i>=0;i--){

enemies[i].x -= speed;

if(enemies[i].x + enemies[i].width < 0){

enemies.splice(i,1);
score++;

if(score%5===0) speed += 0.5;

}

}

}

function collision(){

for(let enemy of enemies){

const hit =
player.x+20 < enemy.x+enemy.width &&
player.x+player.width-20 > enemy.x &&
player.y+10 < enemy.y+enemy.height &&
player.y+player.height-10 > enemy.y;

if(hit){
gameOver = true;
}

}

}

function drawGround(){

ctx.strokeStyle="white";
ctx.lineWidth=2;

ctx.beginPath();
ctx.moveTo(0,GROUND);
ctx.lineTo(canvas.width,GROUND);
ctx.stroke();

}

function drawPlayer(){

ctx.drawImage(
doomfist,
player.x,
player.y,
player.width,
player.height
);

}

function drawEnemies(){

for(let enemy of enemies){

ctx.drawImage(
ana,
enemy.x,
enemy.y,
enemy.width,
enemy.height
);

}

}

function drawScore(){

ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Score: "+score,20,30);

}

function drawGameOver(){

ctx.fillStyle="white";
ctx.font="40px Arial";
ctx.fillText("GAME OVER",400,140);

ctx.font="20px Arial";
ctx.fillText("Press SPACE to restart",410,180);

}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawGround();

if(!gameOver){

updatePlayer();
updateEnemies();
collision();

}

drawPlayer();
drawEnemies();
drawScore();

if(gameOver){

drawGameOver();

}

requestAnimationFrame(update);

}

document.addEventListener("keydown",(e)=>{

if(gameOver && e.code==="Space"){

location.reload();

}

});

update();

</script>

</body>
</html>
